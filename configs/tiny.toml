[run]
name = "tiny"
output_root = "runs"
seed = 1337
device = "cpu"
mixed_precision = false

[tokenizer]
dir = "artifacts/tokenizer"

[data]
train_bin = "artifacts/dataset/train.bin"
val_bin = "artifacts/dataset/val.bin"
batch_size = 8
sequence_length = 32
jsonl_text_field = "text"

[model]
vocab_size = 512
max_position_embeddings = 256
n_embd = 128
n_head = 4
n_layer = 4
dropout = 0.1
tie_weights = true

[training]
max_steps = 500
learning_rate = 0.0003
weight_decay = 0.01
warmup_steps = 50
grad_clip = 1.0
eval_interval = 50
save_interval = 100
log_interval = 10
eval_batches = 10
resume_from = ""

[inference]
temperature = 0.8
top_k = 40
top_p = 0.95
max_new_tokens = 128
repetition_penalty = 1.05
stop_sequences = "<|endoftext|>"

[serving]
host = "127.0.0.1"
port = 8080
web_root = "web"
